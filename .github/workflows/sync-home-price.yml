name: Sync home price data

on:
  schedule:
    # GitHub Actions cron uses UTC. 05:00 UTC is 14:00 KST.
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sync-home-price.yml'
      - 'scripts/sync-home-price.mjs'

permissions:
  contents: write

concurrency:
  group: home-price-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync all real estate data
        env:
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
          RECONSTRUCTION_SERVICE_KEY: ${{ secrets.RECONSTRUCTION_SERVICE_KEY }}
          MOLIT_LAWD_CD: '41115'
          LISTINGS_API_URL: ${{ secrets.LISTINGS_API_URL }}
          LISTINGS_API_TOKEN: ${{ secrets.LISTINGS_API_TOKEN }}
          LISTINGS_SOURCE_NAME: ${{ secrets.LISTINGS_SOURCE_NAME }}
          KB_MARKET_API_URL: ${{ secrets.KB_MARKET_API_URL }}
          KB_MARKET_API_TOKEN: ${{ secrets.KB_MARKET_API_TOKEN }}
          KB_MARKET_SOURCE_NAME: ${{ secrets.KB_MARKET_SOURCE_NAME }}
        run: node scripts/sync-home-price.mjs

      - name: Commit refreshed price data
        run: |
          if git diff --quiet -- data/home-price.json data/reconstruction.json data/candidates.json data/sync-status.json; then
            echo "No price data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/home-price.json data/reconstruction.json data/candidates.json data/sync-status.json
          git commit -m "chore: sync real estate data"
          git push
